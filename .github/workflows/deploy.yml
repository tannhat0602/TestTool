name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Chạy mỗi khi push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Đăng nhập vào Docker Hub bằng Secrets đã tạo
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 3: Xây dựng và đẩy Image lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: tannhat0602/phungnhattan:latest

      # Bước 4: Trigger deploy trên ithutech
      - name: Trigger deploy on ithutech
        run: curl -X POST ${{ secrets.DEPLOY_URL }}
